name: Build Android APK

# How to get your APK:
#   • Go to the repo's "Actions" tab → "Build Android APK" → "Run workflow".
#   • When it finishes (~5 min), download "hostel-app-apk" from that run, OR
#   • grab the public link from the auto-updated "latest" release
#     (Releases → latest → app-debug.apk) — shareable with anyone, no login.

on:
  workflow_dispatch: # manual "Run workflow" button
  push:
    tags: ["v*"] # or push a version tag like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm --workspace web run build

      - name: Sync Capacitor Android project
        working-directory: web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostel-app-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Optional: publishes a public download link. Needs the repo's Actions
      # "Workflow permissions" set to "Read and write". If it can't, the APK is
      # still available above as a build artifact, so we don't fail the build.
      - name: Publish to "latest" release (public download link)
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Android APK
          prerelease: true
          body: |
            📱 **XYZ Hostel — Android app**

            Download `app-debug.apk` below and install it on any Android phone
            (you may need to allow "install from unknown sources").
            On first launch, enter your hostel server address.
          files: web/android/app/build/outputs/apk/debug/app-debug.apk
