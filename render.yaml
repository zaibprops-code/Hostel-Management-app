# Render Blueprint — deploys EVERYTHING (database + backend + website) from this
# repo with one click and no values to paste. In Render, use the
# "Deploy to Render" button in the README (or New + → Blueprint → this repo).

databases:
  # Managed PostgreSQL database, auto-created and auto-connected to the API.
  - name: hostel-db
    databaseName: hostel
    user: hostel
    plan: free

services:
  # ---- Backend API (Node/Express) --------------------------------------
  - type: web
    name: hostel-api
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    # --include=dev keeps build tools (tsc, prisma, tsx) available in prod install.
    # Build only generates the client + compiles (no DB access needed here).
    buildCommand: npm install --include=dev && npm --workspace server run db:generate && npm --workspace server run build
    # Creating tables + seeding happens at start-up, when the DB is reachable.
    # db:push is idempotent; db:seed only runs on an empty DB (safe on restarts).
    startCommand: npm --workspace server run db:push && npm --workspace server run db:seed && npm --workspace server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hostel-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: MAX_UPLOAD_MB
        value: "10"

  # ---- Frontend website (static React build) ---------------------------
  - type: web
    name: hostel-web
    runtime: static
    autoDeploy: true
    buildCommand: npm install --include=dev && npm --workspace web run build
    staticPublishPath: web/dist
    envVars:
      # The frontend is built to talk to this backend address.
      - key: VITE_API_HOST
        value: hostel-api-3fu5.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
