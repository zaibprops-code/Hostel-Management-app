# Render Blueprint — deploys EVERYTHING (database + backend + website) from this
# repo with one click and no values to paste. In Render, use the
# "Deploy to Render" button in the README (or New + → Blueprint → this repo).

databases:
  # Managed PostgreSQL database, auto-created and auto-connected to the API.
  - name: hostel-db
    databaseName: hostel
    user: hostel
    plan: free

services:
  # ---- Backend API (Node/Express) --------------------------------------
  - type: web
    name: hostel-api
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    # --include=dev keeps build tools (tsc, prisma, tsx) available in prod install.
    # Build only generates the client + compiles (no DB access needed here).
    buildCommand: npm install --include=dev && npm --workspace server run db:generate && npm --workspace server run build
    # Create/patch tables at start-up (idempotent). No demo data is loaded — the
    # app starts empty and asks the owner to set up their business on first visit.
    startCommand: npm --workspace server run db:push && npm --workspace server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hostel-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: MAX_UPLOAD_MB
        value: "10"
      # Public website address — used to build the link inside reset emails.
      - key: WEB_APP_URL
        value: https://hostel-web-us71.onrender.com
      # Password-reset email (optional). Fill these in the Render dashboard
      # (Environment tab) — they're marked sync:false so secrets aren't stored
      # in git. See DEPLOYMENT.md → "Password-reset email". Leave blank to skip.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  # ---- Frontend website (static React build) ---------------------------
  - type: web
    name: hostel-web
    runtime: static
    autoDeploy: true
    buildCommand: npm install --include=dev && npm --workspace web run build
    staticPublishPath: web/dist
    envVars:
      # The frontend is built to talk to this backend address.
      - key: VITE_API_HOST
        value: hostel-api-3fu5.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
